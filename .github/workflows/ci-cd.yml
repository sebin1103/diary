name: 📔 Diary CI/CD Pipeline

# ── 트리거 ────────────────────────────────────────────────────
# main 브랜치에 push 하거나 PR을 열 때 자동 실행
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── 전역 환경 변수 ─────────────────────────────────────────────
env:
  NODE_VERSION: '20'

# ── 잡(Jobs) ──────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────
  # 1. LINT — HTML 코드 품질 검사
  # ────────────────────────────────────────────
  lint:
    name: 🔍 HTML Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js ${{ env.NODE_VERSION }} 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 htmlhint 설치
        run: npm install -g htmlhint

      # htmlhint 규칙 파일이 없으면 기본 규칙으로 검사
      - name: ✅ HTML 린트 실행
        run: |
          cat > .htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": true,
            "tag-pair": true,
            "spec-char-escape": true,
            "id-unique": true,
            "src-not-empty": true,
            "title-require": true
          }
          EOF
          htmlhint index.html
          echo "✅ HTML 린트 통과!"

  # ────────────────────────────────────────────
  # 2. BUILD — 배포용 산출물 생성
  # ────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint          # lint 통과 후에만 실행

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 📁 dist 폴더 생성
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          # assets 폴더가 있으면 같이 복사
          [ -d assets ] && cp -r assets dist/assets || true
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> dist/build-info.txt
          echo "commit=${{ github.sha }}" >> dist/build-info.txt
          echo "✅ 빌드 완료! dist/ 폴더 생성됨"
          ls -lh dist/

      - name: 📤 빌드 결과물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: diary-site
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────
  # 3. DEPLOY — GitHub Pages 배포
  #    main 브랜치 push 시에만 실행
  # ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build         # build 통과 후에만 실행
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Pages 배포에 필요한 권한
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: diary-site
          path: dist/

      - name: ⚙️ GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 📤 Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🌐 GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 배포 완료 알림
        run: |
          echo "┌─────────────────────────────────┐"
          echo "│  🎉 배포가 성공적으로 완료됐어요!  │"
          echo "│  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "└─────────────────────────────────┘"
